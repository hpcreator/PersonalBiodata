<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harsh Patel</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
        rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playwrite+IN:wght@100..400&display=swap"
        rel="stylesheet">
  <link href="./style.css" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="./assets/favicon.png">
</head>
<body>
<div class="header">
  <img src="./assets/ganesh.png" alt="Header Image">
</div>
<div class="card-container">
  <div class="card" id="flipCard">
    <div class="card-front">
      <h5>Biodata</h5>
      <img class="pop-img" src="./assets/harsh1.jpg" alt="Profile Picture">
      <div class="details">
        <h4>Harsh Patel</h4>
        <h5>Software Engineer</h5>
      </div>
    </div>
    <div class="card-back">
      <h5 class="text-center w-100 mb-3">My Details</h5>
      <div class=" overflow-auto d-none" id="back-card">
        <dl class="detail-list" id="detail-list"></dl>
        <hr class="mt-5">
        <h5 class="m-0 w-100 text-center">Images</h5>
        <div id="all-images"></div>
      </div>
    </div>
  </div>
</div>
<div class="hint-footer cursor-pointer text-center" id="clickToFlap">
  <h5 class="m-0 pb-3 buttonFlipCard">Click to flip</h5>
</div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script type="text/javascript" src="./main.js"></script>
</body>


<!-- Creates the bootstrap modal where the image will appear -->
<div class="modal fade" id="imagemodal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel"
     aria-hidden="true">
  <div class="modal-dialog h-100 d-flex justify-conent-center align-items-center">
    <div class="modal-content">
      <div class="modal-body px-3 pb-4 pt-0">
        <button type="button" class="close" data-dismiss="modal"><span aria-hidden="true">&times;</span><span
                class="sr-only">Close</span></button>
        <img src="" class="imagepreview" style="width: 100%;" alt="Preview Image">
      </div>
    </div>
  </div>
</div>
</html>
